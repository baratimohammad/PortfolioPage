services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"
    ports:
      - "3000:3000"
    # Contain runaway processes without starving normal traffic.
    cpus: "2.0"
    mem_limit: "3g"
    tmpfs:
      - /tmp:rw,noexec,nosuid
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    restart: unless-stopped
