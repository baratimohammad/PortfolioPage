user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Access log tuned for spike forensics.
  log_format main '$remote_addr $host $server_port [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                  'rt=$request_time urt=$upstream_response_time '
                  'ustatus=$upstream_status lrs=$limit_req_status';
  access_log /dev/stdout main;
  access_log /var/log/nginx/access.log main buffer=64k flush=1s;

  # Drop obviously hostile scanners/miners.
  geo $block_bad_ip {
    default 0;
    20.106.196.31 1;
    45.156.128.0/24 1;
    71.6.134.230 1;
    71.6.167.142 1;
    79.124.40.174 1;
    79.137.195.90 1;
    85.11.183.6 1;
    87.120.191.100 1;
    92.63.197.50 1;
    92.246.139.183 1;
    93.115.28.13 1;
    95.214.55.230 1;
    112.46.216.152 1;
    138.197.191.87 1;
    152.32.189.128 1;
    159.223.193.66 1;
    167.94.138.204 1;
    172.202.118.18 1;
    179.43.184.242 1;
    185.16.39.52 1;
    188.119.122.29 1;
    193.142.147.209 1;
    198.235.24.0/24 1;
    204.76.203.8 1;
    206.168.34.57 1;
    213.209.143.0/24 1;
    217.76.56.202 1;
    45.38.44.221 1;
    46.226.162.108 1;
    52.165.82.22 1;
    64.227.37.51 1;
    64.62.156.0/24 1;
  }

  # Throttle abusive clients to keep the upstream app responsive.
  limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=5r/s;
  limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
  limit_req_status 429;
  limit_req_log_level warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream next_app {
    server web:3000;
    keepalive 32;
  }

  upstream grafana_app {
    server host.docker.internal:3001;
    keepalive 16;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name barati.tech www.barati.tech;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      allow all;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 80;
    listen [::]:80;
    server_name grafana.barati.tech;

    root /var/www/certbot;

    location /.well-known/acme-challenge/ {
      alias /var/www/certbot/.well-known/acme-challenge/;
      allow all;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name barati.tech www.barati.tech;

    if ($block_bad_ip) { return 444; }

    limit_conn conn_per_ip 15;

    ssl_certificate /etc/letsencrypt/live/barati.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barati.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/barati.tech/chain.pem;

    # These files are dropped by certbot automatically after the first run.
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      allow all;
      try_files $uri =404;
    }

    location /_next/static/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      proxy_pass http://next_app;
      proxy_hide_header X-Frame-Options;
      proxy_hide_header Content-Security-Policy;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /_next/image {
      proxy_pass http://next_app;
      proxy_hide_header X-Frame-Options;
      proxy_hide_header Content-Security-Policy;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      limit_req zone=req_per_ip burst=10 nodelay;
      proxy_pass http://next_app;
      proxy_hide_header X-Frame-Options;
      proxy_hide_header Content-Security-Policy;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.barati.tech;

    if ($block_bad_ip) { return 444; }

    limit_conn conn_per_ip 15;

    ssl_certificate /etc/letsencrypt/live/barati.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barati.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/barati.tech/chain.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      allow all;
      try_files $uri =404;
    }

    location / {
      limit_req zone=req_per_ip burst=10 nodelay;
      proxy_pass http://grafana_app;
      proxy_hide_header X-Frame-Options;
      proxy_hide_header Content-Security-Policy;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
